<svg width="1200" height="360" viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title description">
  <title id="title">Raserva Web animated banner</title>
  <desc id="description">Animated banner for the Raserva restaurant reservation website.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8F2"/>
      <stop offset="58%" stop-color="#F9E5D4"/>
      <stop offset="100%" stop-color="#E9B48A"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E9B48A"/>
      <stop offset="50%" stop-color="#956959"/>
      <stop offset="100%" stop-color="#5C352C"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <style>
      .orb { animation: float 7s ease-in-out infinite alternate; }
      .orb.two { animation-delay: -2.5s; }
      .plate { animation: breathe 4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .spark { animation: twinkle 2.2s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .spark.two { animation-delay: .7s; }
      .spark.three { animation-delay: 1.4s; }
      .dash { animation: run 12s linear infinite; }
      @keyframes float { from { transform: translate(-28px, 12px); } to { transform: translate(48px, -15px); } }
      @keyframes breathe { 0%, 100% { transform: scale(.97); } 50% { transform: scale(1.04); } }
      @keyframes twinkle { 0%, 100% { opacity: .28; transform: scale(.7); } 50% { opacity: 1; transform: scale(1.2); } }
      @keyframes run { to { stroke-dashoffset: -420; } }
    </style>
  </defs>
  <rect width="1200" height="360" rx="28" fill="url(#background)"/>
  <circle class="orb" cx="120" cy="40" r="160" fill="#E9B48A" opacity=".3" filter="url(#blur)"/>
  <circle class="orb two" cx="1060" cy="320" r="180" fill="#956959" opacity=".28" filter="url(#blur)"/>
  <path class="dash" d="M72 293C300 240 468 342 695 289C879 246 1006 260 1140 214" fill="none" stroke="#956959" stroke-dasharray="6 16" stroke-linecap="round" stroke-width="3" opacity=".5"/>
  <g class="plate" transform="translate(965 138)">
    <circle r="84" fill="#FFF8F2" stroke="#956959" stroke-width="3"/>
    <circle r="61" fill="none" stroke="#E9B48A" stroke-width="3"/>
    <circle r="22" fill="url(#warm)" opacity=".9"/>
    <path d="M-44 2C-18-35 10-41 43-10M-38 29C-12 7 17 4 43 22" fill="none" stroke="#5C352C" stroke-linecap="round" stroke-width="5"/>
  </g>
  <g fill="#5C352C">
    <path class="spark" d="M844 72l6 16 16 6-16 6-6 16-6-16-16-6 16-6z"/>
    <path class="spark two" d="M1102 72l4 11 11 4-11 4-4 11-4-11-11-4 11-4z"/>
    <path class="spark three" d="M818 214l4 11 11 4-11 4-4 11-4-11-11-4 11-4z"/>
  </g>
  <text x="78" y="94" fill="#956959" font-family="Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="6">RESERVE  &#8226;  DINE  &#8226;  REMEMBER</text>
  <text x="73" y="194" fill="#2A1713" font-family="Georgia, serif" font-size="108" font-weight="700">Raserva<tspan fill="#956959">.</tspan></text>
  <text x="82" y="242" fill="#5C352C" font-family="Arial, sans-serif" font-size="22" letter-spacing="2">A WARMER WAY TO BOOK YOUR TABLE</text>
</svg>
